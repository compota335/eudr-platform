{# Replaces the email-capture form once an email is stored: the PDF is unlocked. #}
<div class="rounded-md border border-emerald-200 bg-emerald-50 p-4">
  <h3 class="text-sm font-semibold text-emerald-800">Report unlocked</h3>
  <p class="mt-1 text-xs text-emerald-700">
    Your PDF risk report is ready to download.
  </p>
  <a
    href="/api/check-plot/{{ token }}/pdf"
    class="mt-3 inline-flex items-center rounded-md bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700"
  >
    Download PDF report
  </a>
</div>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ title|default("EUDR Platform") }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
        <a href="/" class="text-lg font-semibold text-emerald-700">EUDR Platform</a>
        <nav class="flex gap-4 text-sm">
          <a href="/plot-checker" class="hover:text-emerald-700">Plot checker</a>
          <a href="/scope-checker" class="hover:text-emerald-700">Scope checker</a>
        </nav>
      </div>
    </header>
    <main class="mx-auto max-w-5xl px-6 py-10">
      {% block content %}{% endblock %}
    </main>
    <footer class="mx-auto max-w-5xl px-6 py-10 text-xs text-slate-400">
      EUDR compliance tooling. Not legal advice. Regulation (EU) 2023/1115.
    </footer>
  </body>
</html>
